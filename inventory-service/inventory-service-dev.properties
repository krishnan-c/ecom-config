# ===============================
# Database Configuration
# ===============================
spring.datasource.platform=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/ecom_inventory
spring.datasource.username=${P_DEV_DB_USRN}
spring.datasource.password=${P_DEV_DB_PWD}
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.jpa.hibernate.naming-strategy=org.hibernate.cfg.ImprovedNamingStrategy
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.test-while-idle=true
spring.datasource.validation-query=SELECT 1

# Flyway manages schema, Hibernate only validates it
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL dialect
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# Flyway Configuration
# ===============================

spring.flyway.enabled=true

# Migration folder
spring.flyway.locations=classpath:db/migration

# Useful when database already exists
spring.flyway.baseline-on-migrate=true

# Validate migration scripts before startup
spring.flyway.validate-on-migrate=true


# ===============================
# Actuator Configuration
# ===============================


management.endpoints.web.base-path=/

management.endpoints.web.exposure.include=*
management.endpoints.enabled-by-default=true

management.endpoint.health.enabled=true
management.endpoint.health.show-details=always

# Disable database health check
management.health.db.enabled=false

# Enable disk space health check
management.health.diskspace.enabled=true

# ===============================
# ENCRYPTION
# ===============================
inventory.app.encryption-key={P_INVN_DEV_ENC_KEY}

logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.flywaydb=DEBUG
